{% load crispy_forms_tags %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <title>Tomas - School Project Survey</title>
</head>
<body  style="background: url('{% static "background-school.jpg" %}') no-repeat fixed top right / cover;">
  <div class="container" style="background-color: rgba(255, 217, 33, 0.8); padding: 2vh;">
    <div class="text-center col-12">
  <h1>Tomas - School Project Survey</h1>
    </div>
  <form method="post" action="{% url 'survey' %}">
    {% csrf_token %}
    {{ form | crispy }}
    <div class="col-12 text-center">
    <button type="submit" class="btn btn-success">Submit your answer</button>
    </div>
  </form>
</div>  
</body>
</html>
